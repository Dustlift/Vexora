[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["node_modules", "lib"]
test = "contracts/test"
script = "contracts/script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }
